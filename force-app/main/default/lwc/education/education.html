<template>
    <lightning-card title="Candidate Education" icon-name="standard:contact">
        <lightning-record-edit-form record-id={recordId} object-api-name="Education__c" onerror={handleError} onsuccess={handleSuccess}>
            <lightning-record-view-form record-id={recordId} object-api-name="Education__c">
                <div class="slds-box">
                        <template if:true={editMode}>
                            <lightning-button variant="Neutral" label="Save" title="Save" type="submit"
                                icon-name="utility:save" slot="actions" class="slds-var-p-around_xxx-small"></lightning-button>
                            <lightning-button variant="brand" label="Cancel" title="Cancel" type="reset"
                                onclick={clearEditMode} icon-name="utility:undo" slot="actions"
                                class="slds-var-p-around_xxx-small"></lightning-button>
                        </template>
                        <template if:false={editMode}>
                            <lightning-button variant="brand" label="Edit" title="Edit" onclick={setEditMode}
                                icon-name="utility:edit" slot="actions" class="slds-var-p-around_xxx-small"></lightning-button>
                        </template>
                        <lightning-layout multiple-rows="true">
                                <lightning-layout-item size="6" padding="around-small">
                                    <template if:true={editMode}>
                                        <lightning-input-field field-name="Name"></lightning-input-field>
                                    </template>
                                    <template if:false={editMode}>
                                            <lightning-output-field field-name="Name"></lightning-output-field>
                                    </template>
                                </lightning-layout-item>
                            <!-- ... repeat above for all fields... -->
                            <lightning-layout-item size="6" padding="around-small">
                                <template if:true={editMode}>
                                    <lightning-input-field field-name="CandidateProfile__c"></lightning-input-field>
                                </template>
                                <template if:false={editMode}>
                                        <lightning-output-field field-name="CandidateProfile__c"></lightning-output-field>
                                </template>
                            </lightning-layout-item>
                            <lightning-layout-item size="6" padding="around-small">
                                <template if:true={editMode}>
                                    <lightning-input-field field-name="Passing_Year__c"></lightning-input-field>
                                </template>
                                <template if:false={editMode}>
                                        <lightning-output-field field-name="Passing_Year__c"></lightning-output-field>
                                </template>
                            </lightning-layout-item>
                        </lightning-layout>
                </div>
            </lightning-record-view-form>
        </lightning-record-edit-form>
    </lightning-card>
</template>
