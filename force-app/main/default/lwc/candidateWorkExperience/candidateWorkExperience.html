<template>
    <lightning-card title="Candidate Work Experience" icon-name="standard:contact">
        <div class="slds-var-m-around_medium">
            <!-- Use lightning-record-edit-form to create a form that’s used to add or update a Salesforce record on an object -->
            
            <lightning-record-edit-form 
                object-api-name="Work_Experience__c"
                record-id={recordId}
                onsubmit={handleSubmit}
                onsuccess={handleSuccess}
            >
                <lightning-messages></lightning-messages>
                <div class="slds-grid slds-wrap">
                    <div class="slds-col slds-size_1-of-2">
                        <lightning-input-field field-name="Company_Name__c"></lightning-input-field>
                        <lightning-input-field type="date" field-name="JobStartDate__c"></lightning-input-field>
                        <lightning-input-field field-name="Work_Location__c"></lightning-input-field>
                        <lightning-input-field field-name="Description__c"></lightning-input-field>
                    </div>
                    <div class="slds-col slds-size_1-of-2">
                        <lightning-input-field field-name="Role__c"></lightning-input-field>
                        <lightning-input-field type="date" field-name="JobEndDate__c"></lightning-input-field>
                        <lightning-input-field field-name="IsCurrent__c"></lightning-input-field>
                        <lightning-input-field field-name="CandidateProfile__c"></lightning-input-field>
                    </div>
                </div>
                <div class="slds-var-m-top_medium">
                    <lightning-button variant="brand" type="submit" name="save" label="Save"></lightning-button>
                    
                </div>
            </lightning-record-edit-form>
        </div>
    </lightning-card>
</template>
