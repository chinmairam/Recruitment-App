<!-- sldsValidatorIgnore -->
<template>
    <lightning-card title="Job Postings" icon-name="standard:work_order">
      <div class="slds-var-m-around_medium">
        <lightning-datatable
          key-field="id"
          data={jobPostings}
          columns={columns}
          onrowaction={handleRowAction}
        ></lightning-datatable>
        <template if:true={isLoading}>
            <div class="slds-align_absolute-center slds-p-top_medium">
              <lightning-spinner alternative-text="Loading" variant="brand" size="medium"></lightning-spinner>
            </div>
        </template>
        <lightning-button class="slds-var-m-top_large"
          label="Create Job Posting"
          onclick={handleCreate}
        ></lightning-button>
      </div>
    </lightning-card>
    <!-- modal popup -->
    <template if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
             <!-- Modal/Popup header-->
               <header class="slds-modal__header">
                  <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={hideModalBox}>
                     <lightning-icon icon-name="utility:close"
                        alternative-text="close"
                        variant="inverse"
                        size="small" ></lightning-icon>
                     <span class="slds-assistive-text">Close</span>
                  </button>
               </header> 
               <!-- Modal/Popup body -->
               <div class="slds-modal__content slds-var-p-around_medium" id="modal-content-id-1">
                    <template lwc:if={isEditRecord}>
                        <h2 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">Edit Job</h2>
                        <lightning-record-edit-form record-id={recordIdToEdit} object-api-name="Job_Posting__c" onsuccess={handleSubmit}>
                            <lightning-input-field field-name="Name"></lightning-input-field>
                            <lightning-input-field field-name="Department__c"></lightning-input-field>
                            <lightning-input-field field-name="Location__c"></lightning-input-field>
                            <lightning-input-field field-name="Job_Description__c"></lightning-input-field>
                            <lightning-input-field field-name="Application_Deadline__c"></lightning-input-field>
                            <lightning-input-field field-name="Contact__c"></lightning-input-field>
                            <lightning-button
                                class="slds-var-m-top_small"
                                variant="brand"
                                type="submit"
                                name="update"
                                label="Update">
                            </lightning-button>
                        </lightning-record-edit-form>
                    </template>
                    <template lwc:elseif={isCreateRecord}>
                        <h2 id="modal-heading-02" class="slds-text-heading_medium slds-hyphenate">Create Job</h2>
                        <lightning-record-form 
                        object-api-name={objectApiName} 
                        fields={fields} 
                        onsuccess={handleSuccess}>
                        </lightning-record-form>
                    </template>
                    <template lwc:else>
                        <lightning-record-view-form record-id={recordToView} object-api-name="Job_Posting__c">
                            <lightning-output-field field-name="Name"></lightning-output-field>
                            <lightning-output-field field-name="Department__c"></lightning-output-field>
                            <lightning-output-field field-name="Location__c"></lightning-output-field>
                            <lightning-output-field field-name="Job_Description__c"></lightning-output-field>
                            <lightning-output-field field-name="Application_Deadline__c"></lightning-output-field>
                        </lightning-record-view-form>
                    </template>
                    <!-- Modal/Popup footer-->
                    <footer class="slds-modal__footer">
                        <footer class="slds-modal__footer">
                            <button class="slds-button slds-button_neutral" onclick={closeModal}>Close</button>
                        </footer>
                    </footer>
                </div>
            </div>
        </section>
    </template>
</template>
