<template>
    <lightning-card title="Upload Documents">
        <template if:true={relatedRecordBool}>
            <lightning-file-upload
                label="Attach Docs"
                name="UploadFile"
                record-id={relatedRecordId}
                onuploadfinished={handleUploadFinished}
                multiple
            >
            </lightning-file-upload>

            <br/>
            <div class="
                slds-page-header__row
                slds-var-m-top_x-small
                slds-var-m-left_medium
                slds-grid slds-wrap"
            >
                <ul class="slds-grid slds-wrap slds-gutters">
                <template if:true={loaded}>
                    <template for:each={files} for:item="file">
                    <c-preview-file-thumbnail-card
                        key={file.Id}
                        file={file}
                        record-id={relatedRecordId}
                        thumbnail={file.thumbnailFileCard}
                    ></c-preview-file-thumbnail-card>
                    </template>
                </template>
                </ul>
            </div>
        </template>
        <template if:false={relatedRecordBool}>
            <h1>Please check with your Helpdesk for additional help!!!</h1>
        </template>
    </lightning-card>
</template>
