<!-- sldsValidatorIgnore -->
<template>
    <lightning-card title="Job Search" icon-name="custom:custom19">
        <div class="slds-var-m-around_medium">
            <div class="slds-grid slds-wrap">
                <div class="slds-col slds-size_1-of-2 slds-var-p-around_x-small">
                    <lightning-input type="text" label="Location" name="location" value={location} onchange={handleLocationChange}></lightning-input>
                </div>
                
                <div class="slds-col slds-size_1-of-2 slds-var-p-around_x-small">
                    <lightning-combobox label="Industry" name="industry" value={industry} onchange={handleIndustryChange} options={industryOptions}></lightning-combobox>
                </div>
            
                <div class="slds-col slds-size_1-of-2 slds-var-p-around_x-small">
                    <lightning-combobox label="Job Type" name="jobType" value={jobType} options={jobTypeOptions} onchange={handleJobTypeChange}></lightning-combobox>
                </div>
                <lightning-button label="Search" onclick={handleSearch}></lightning-button>
            </div>
            
                <div class="slds-var-m-top_medium">
                    <lightning-datatable data={jobListings} columns={columns} key-field="Id"></lightning-datatable>
                </div>
            
            <template if:true={error}>
                <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error" role="alert">
                    <span class="slds-assistive-text">error</span>
                    <span class="slds-icon_container slds-icon-utility-error slds-var-m-right_x-small" title="Description of icon when needed">
                        <lightning-icon icon-name="utility:error" size="x-small" variant="inverse"></lightning-icon>
                    </span>
                    <h2>{error.body.message}</h2>
                </div>
            </template> 
        </div>
    </lightning-card>
</template>
